server.port=8088
server.servlet.context-path=/api/v1

spring.application.name=promociones
spring.datasource.url=jdbc:mysql://localhost:3306/kiosko_promociones?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# 'validate' es la mejor práctica cuando usas Flyway para asegurar que el código coincida con la DB
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration


logging.level.root=WARN
logging.level.org.springframework.web=DEBUG
logging.level.cl.kiosko=INFO
logging.file.name=promociones-app.log
logging.file.path=./logs