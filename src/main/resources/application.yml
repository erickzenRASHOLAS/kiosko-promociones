server:
  port: 8088
  servlet:
    context-path: /api

spring:
  application:
    name: promociones
  datasource:
    url: jdbc:mysql://localhost:3306/kiosko_promociones?createDatabaseIfNotExist=true
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    root: WARN
    org:
      springframework:
        web: DEBUG
    cl:
      kiosko: INFO
  file:
    name: promociones-app.log
    path: ./logs

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

application:
  security:
    jwt:
      secret-key: ClaveSecreta123456789ClaveSecreta123456789ClaveSecreta123456789
      # Tiempo de vida del token (86400000 ms = 1 día)
      expiration: 86400000